<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Mentally Swasth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .signup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.5s ease;
        }

        .signup-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-xl);
            padding: 40px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-xl);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 3rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: var(--border-radius-md);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            color: var(--success);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group label i {
            color: var(--primary);
            margin-right: 8px;
        }

        .input-field {
            width: 100%;
            padding: 15px 20px;
            background: var(--input-bg);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius-md);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all var(--transition-normal);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .login-link a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .terms {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-xxl);
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all var(--transition-normal);
        }

        .theme-toggle:hover {
            background: var(--card-hover);
            transform: scale(1.05);
            border-color: var(--primary);
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 30px 20px;
            }
            
            .theme-toggle span {
                display: none;
            }
        }
    </style>
</head>
<body class="signup-page">
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
        <i class="fas fa-moon moon-icon"></i>
        <i class="fas fa-sun sun-icon" style="display: none;"></i>
        <span id="themeText">Dark Mode</span>
    </button>

    <div class="signup-container">
        <div class="signup-card">
            <div class="logo">
                <i class="fas fa-brain"></i>
                <h1>Mentally Swasth</h1>
                <p>Create your account to begin your wellness journey</p>
            </div>

            <!-- Success Message -->
            {% if success %}
            <div class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                {{ success }}
            </div>
            {% endif %}

            <!-- Error Message -->
            {% if error %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <!-- Signup Form -->
            <form method="POST" action="/signup">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" class="input-field" name="username" 
                           placeholder="Choose a username" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" class="input-field" name="email" 
                           placeholder="your@email.com" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-phone"></i>
                        Phone (Optional)
                    </label>
                    <input type="tel" class="input-field" name="phone" 
                           placeholder="Your phone number">
                </div>

                <button type="submit" class="btn-signup">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="login-link">
                Already have an account? 
                <a href="/login">Login here</a>
            </div>

            <div class="terms">
                By signing up, you agree to our 
                <a href="#">Terms of Service</a> and 
                <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        // ========== THEME TOGGLE ==========
        function toggleTheme() {
            const body = document.body;
            const moonIcon = document.querySelector('.moon-icon');
            const sunIcon = document.querySelector('.sun-icon');
            const themeText = document.getElementById('themeText');
            
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode');
                moonIcon.style.display = 'inline-block';
                sunIcon.style.display = 'none';
                themeText.textContent = 'Dark Mode';
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'inline-block';
                themeText.textContent = 'Light Mode';
                localStorage.setItem('theme', 'light');
            }
        }

        // Initialize theme
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const moonIcon = document.querySelector('.moon-icon');
            const sunIcon = document.querySelector('.sun-icon');
            const themeText = document.getElementById('themeText');
            
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'inline-block';
                themeText.textContent = 'Light Mode';
            } else {
                document.body.classList.remove('light-mode');
                moonIcon.style.display = 'inline-block';
                sunIcon.style.display = 'none';
                themeText.textContent = 'Dark Mode';
            }
        }

        document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
